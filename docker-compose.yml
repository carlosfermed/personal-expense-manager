name: perexmanager

services:
  postgres:
    image: postgres:16-alpine
    container_name: perexmanager-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: perexmanager
      POSTGRES_PASSWORD: perexmanager
      POSTGRES_DB: perexmanager_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:
