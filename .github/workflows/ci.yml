name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://perexmanager:perexmanager@localhost:5432/perexmanager_test
      JWT_SECRET: test-jwt-secret-with-at-least-thirty-two-chars
      JWT_EXPIRES_IN: 1h

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: perexmanager
          POSTGRES_PASSWORD: perexmanager
          POSTGRES_DB: perexmanager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perexmanager -d perexmanager_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
